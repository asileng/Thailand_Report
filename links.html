<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参考文献审核 - 泰国投资报告审核系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .links-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-card.total h3 { color: var(--thai-blue); }
        .stat-card.original h3 { color: var(--status-reviewed); }
        .stat-card.news h3 { color: var(--status-pending); }
        .stat-card.reference h3 { color: var(--thai-red); }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--thai-red);
            background: var(--thai-red);
            color: white;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--thai-red);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--thai-blue);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--thai-red);
        }

        .links-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .links-table thead {
            background: linear-gradient(135deg, var(--thai-red), var(--thai-blue));
            color: white;
        }

        .links-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .links-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .links-table tbody tr:hover {
            background: var(--bg-primary);
        }

        .link-url {
            color: var(--thai-blue);
            text-decoration: none;
            word-break: break-all;
            display: block;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-url:hover {
            color: var(--thai-red);
            text-decoration: underline;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge.original { background: #D4EDDA; color: #155724; }
        .badge.news { background: #FFF3CD; color: #856404; }
        .badge.reference { background: #F8D7DA; color: #721C24; }

        .section-ref {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .link-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .link-status.valid { background: #D4EDDA; color: #155724; }
        .link-status.invalid { background: #F8D7DA; color: #721C24; }
        .link-status.pending { background: #FFF3CD; color: #856404; }

        .export-btn {
            padding: 10px 20px;
            background: var(--thai-red);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .export-btn:hover {
            background: #8B1425;
        }
    </style>
</head>
<body>
    <div class="links-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回思维导图
        </a>

        <h1 style="margin-bottom: 30px;">
            <i class="fas fa-link"></i> 参考文献审核
        </h1>

        <div class="stats-grid" id="stats-grid">
            <!-- 动态生成统计卡片 -->
        </div>

        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索链接URL或描述...">
            </div>
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="original">原文来源</button>
            <button class="filter-btn" data-filter="news">新闻来源</button>
            <button class="filter-btn" data-filter="reference">参考来源</button>
            <button class="filter-btn" data-filter="valid">有效</button>
            <button class="filter-btn" data-filter="invalid">失效</button>
            <button class="filter-btn" data-filter="pending">待检查</button>
            <button class="export-btn" id="export-btn">
                <i class="fas fa-download"></i> 导出审核报告
            </button>
        </div>

        <table class="links-table">
            <thead>
                <tr>
                    <th>链接URL</th>
                    <th>来源类型</th>
                    <th>内容类型</th>
                    <th>所属章节</th>
                    <th>链接描述</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="links-tbody">
                <!-- 动态生成链接行 -->
            </tbody>
        </table>
    </div>

    <script src="data.js"></script>
    <script>
        // 参考文献审核逻辑
        class LinksReviewSystem {
            constructor(data) {
                this.data = data;
                this.links = this.processLinks();
                this.linkStatuses = this.loadStatuses();
                this.init();
            }

            processLinks() {
                const allLinks = [];

                this.data.sections.forEach(section => {
                    if (section.links && section.links.length > 0) {
                        section.links.forEach(link => {
                            allLinks.push({
                                ...link,
                                sectionId: section.id,
                                sectionNumber: section.section_number,
                                sectionTitle: section.title
                            });
                        });
                    }
                });

                return allLinks;
            }

            loadStatuses() {
                const saved = localStorage.getItem('link_review_statuses');
                return saved ? JSON.parse(saved) : {};
            }

            saveStatuses() {
                localStorage.setItem('link_review_statuses', JSON.stringify(this.linkStatuses));
            }

            init() {
                this.renderStats();
                this.renderTable();
                this.bindEvents();
            }

            renderStats() {
                const total = this.links.length;
                const original = this.links.filter(l => l.source_type === '原文来源').length;
                const news = this.links.filter(l => l.source_type === '新闻来源').length;
                const reference = this.links.filter(l => l.source_type === '参考来源').length;

                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = `
                    <div class="stat-card total">
                        <h3>${total}</h3>
                        <p>总链接数</p>
                    </div>
                    <div class="stat-card original">
                        <h3>${original}</h3>
                        <p>原文来源</p>
                    </div>
                    <div class="stat-card news">
                        <h3>${news}</h3>
                        <p>新闻来源</p>
                    </div>
                    <div class="stat-card reference">
                        <h3>${reference}</h3>
                        <p>参考来源</p>
                    </div>
                `;
            }

            renderTable(filter = 'all', search = '') {
                const tbody = document.getElementById('links-tbody');
                let filtered = this.links;

                // 应用过滤器
                if (filter === 'original') {
                    filtered = filtered.filter(l => l.source_type === '原文来源');
                } else if (filter === 'news') {
                    filtered = filtered.filter(l => l.source_type === '新闻来源');
                } else if (filter === 'reference') {
                    filtered = filtered.filter(l => l.source_type === '参考来源');
                } else if (filter === 'valid') {
                    filtered = filtered.filter(l => this.linkStatuses[l.url] === 'valid');
                } else if (filter === 'invalid') {
                    filtered = filtered.filter(l => this.linkStatuses[l.url] === 'invalid');
                } else if (filter === 'pending') {
                    filtered = filtered.filter(l => !this.linkStatuses[l.url] || this.linkStatuses[l.url] === 'pending');
                }

                // 应用搜索
                if (search) {
                    search = search.toLowerCase();
                    filtered = filtered.filter(l =>
                        l.url.toLowerCase().includes(search) ||
                        (l.description && l.description.toLowerCase().includes(search)) ||
                        l.sectionTitle.toLowerCase().includes(search)
                    );
                }

                tbody.innerHTML = filtered.map(link => {
                    const status = this.linkStatuses[link.url] || 'pending';
                    const statusText = {
                        'valid': '✓ 有效',
                        'invalid': '✗ 失效',
                        'pending': '○ 待检查'
                    };

                    return `
                        <tr>
                            <td>
                                <a href="${link.url}" target="_blank" class="link-url" title="${link.url}">
                                    ${link.url}
                                </a>
                            </td>
                            <td>
                                <span class="badge ${link.source_type === '原文来源' ? 'original' : link.source_type === '新闻来源' ? 'news' : 'reference'}">
                                    ${link.source_type}
                                </span>
                            </td>
                            <td>${link.content_type || '-'}</td>
                            <td class="section-ref">
                                ${link.sectionNumber}<br>
                                <small>${link.sectionTitle.substring(0, 30)}...</small>
                            </td>
                            <td>${link.description ? link.description.substring(0, 50) + '...' : '-'}</td>
                            <td>
                                <span class="link-status ${status}" data-url="${link.url}">
                                    ${statusText[status]}
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            bindEvents() {
                // 搜索
                document.getElementById('search-input').addEventListener('input', (e) => {
                    const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                    this.renderTable(activeFilter, e.target.value);
                });

                // 过滤按钮
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        const search = document.getElementById('search-input').value;
                        this.renderTable(e.target.dataset.filter, search);
                    });
                });

                // 状态切换
                document.getElementById('links-tbody').addEventListener('click', (e) => {
                    const statusEl = e.target.closest('.link-status');
                    if (statusEl) {
                        const url = statusEl.dataset.url;
                        this.toggleStatus(url);
                    }
                });

                // 导出
                document.getElementById('export-btn').addEventListener('click', () => {
                    this.exportReport();
                });
            }

            toggleStatus(url) {
                const current = this.linkStatuses[url] || 'pending';
                const next = {
                    'pending': 'valid',
                    'valid': 'invalid',
                    'invalid': 'pending'
                };
                this.linkStatuses[url] = next[current];
                this.saveStatuses();

                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                const search = document.getElementById('search-input').value;
                this.renderTable(activeFilter, search);
            }

            exportReport() {
                let report = '参考文献审核报告\n';
                report += '='.repeat(60) + '\n';
                report += `生成时间: ${new Date().toLocaleString('zh-CN')}\n\n`;

                // 统计
                const valid = Object.values(this.linkStatuses).filter(s => s === 'valid').length;
                const invalid = Object.values(this.linkStatuses).filter(s => s === 'invalid').length;
                const pending = this.links.length - valid - invalid;

                report += '统计信息:\n';
                report += `- 总链接数: ${this.links.length}\n`;
                report += `- 有效: ${valid}\n`;
                report += `- 失效: ${invalid}\n`;
                report += `- 待检查: ${pending}\n\n`;

                // 按来源类型分组
                report += '按来源类型分类:\n';
                report += '-'.repeat(60) + '\n';

                const byType = {};
                this.links.forEach(link => {
                    if (!byType[link.source_type]) {
                        byType[link.source_type] = [];
                    }
                    byType[link.source_type].push(link);
                });

                Object.entries(byType).forEach(([type, links]) => {
                    report += `\n${type} (${links.length}个):\n`;
                    links.forEach(link => {
                        const status = this.linkStatuses[link.url] || 'pending';
                        report += `  [${status === 'valid' ? '✓' : status === 'invalid' ? '✗' : '○'}] ${link.url}\n`;
                        report += `      所属章节: ${link.sectionNumber} ${link.sectionTitle}\n`;
                        if (link.description) {
                            report += `      描述: ${link.description}\n`;
                        }
                        report += '\n';
                    });
                });

                // 下载
                const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `参考文献审核报告_${new Date().toISOString().split('T')[0]}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new LinksReviewSystem(reportData);
        });
    </script>
</body>
</html>
