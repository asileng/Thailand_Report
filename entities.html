<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实体覆盖检查 - 泰国投资报告审核系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .entity-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .stat-card.has-links h3 { color: var(--status-reviewed); }
        .stat-card.no-links h3 { color: var(--status-need-more); }

        .entity-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .entity-table thead {
            background: linear-gradient(135deg, var(--thai-red), var(--thai-blue));
            color: white;
        }

        .entity-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .entity-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .entity-table tbody tr:hover {
            background: var(--bg-primary);
        }

        .entity-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .entity-type.法律 { background: #E3F2FD; color: #1976D2; }
        .entity-type.法案 { background: #F3E5F5; color: #7B1FA2; }
        .entity-type.政策 { background: #E8F5E9; color: #388E3C; }

        .coverage-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .coverage-status.covered {
            background: #D4EDDA;
            color: var(--status-reviewed);
        }

        .coverage-status.uncovered {
            background: #F8D7DA;
            color: var(--status-need-more);
        }

        .coverage-status.partial {
            background: #FFF3CD;
            color: var(--status-pending);
        }

        .link-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .link-list li {
            margin-bottom: 5px;
        }

        .link-list a {
            color: var(--thai-blue);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .link-list a:hover {
            color: var(--thai-red);
        }

        .link-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .link-badge.原文来源 { background: #E3F2FD; color: #1976D2; }
        .link-badge.新闻来源 { background: #FFF3E0; color: #F57C00; }
        .link-badge.参考来源 { background: #F3E5F5; color: #7B1FA2; }


        .review-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .review-status.pending {
            background: #FFF3CD;
            color: #856404;
        }

        .review-status.reviewed {
            background: #D4EDDA;
            color: #155724;
        }

        .review-status.need-more {
            background: #F8D7DA;
            color: #721C24;
        }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--thai-red);
            background: var(--thai-red);
            color: white;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--thai-red);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--thai-blue);
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--thai-red);
        }
    </style>
</head>
<body>
    <div class="entity-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回思维导图
        </a>

        <h1 style="margin-bottom: 30px;">
            <i class="fas fa-search"></i> 实体覆盖检查
        </h1>

        <div class="stats-grid" id="stats-grid">
            <!-- 动态生成统计卡片 -->
        </div>

        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索实体名称...">
            </div>
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="法律">法律</button>
            <button class="filter-btn" data-filter="法案">法案</button>
            <button class="filter-btn" data-filter="政策">政策</button>
            <button class="filter-btn" data-filter="covered">有链接</button>
            <button class="filter-btn" data-filter="uncovered">无链接</button>
        </div>

        <table class="entity-table">
            <thead>
                <tr>
                    <th>实体名称</th>
                    <th>类型</th>
                    <th>年份</th>
                    <th>链接覆盖状态</th>
                    <th>审核状态</th>
                    <th>相关链接</th>
                </tr>
            </thead>
            <tbody id="entity-tbody">
                <!-- 动态生成实体行 -->
            </tbody>
        </table>
    </div>

    <script src="data.js"></script>
    <script src="xml-data-manager.js"></script>
    <script>
        // 实体覆盖检查逻辑
        class EntityCoverageChecker {
            constructor(data) {
                this.data = data;
                this.dataManager = window.xmlDataManager;
                this.entities = this.processEntities();
                this.init();
            }

            processEntities() {
                const entityMap = new Map();

                // 收集所有实体
                this.data.sections.forEach(section => {
                    if (section.features) {
                        section.features.forEach(feature => {
                            if (!entityMap.has(feature.name)) {
                                entityMap.set(feature.name, {
                                    ...feature,
                                    sections: [],
                                    links: []
                                });
                            }
                            const entity = entityMap.get(feature.name);
                            entity.sections.push(section.section_number);

                            // 查找相关链接
                            section.links.forEach(link => {
                                if (!entity.links.find(l => l.url === link.url)) {
                                    entity.links.push({
                                        url: link.url,
                                        description: link.description,
                                        source_type: link.source_type,
                                        content_type: link.content_type
                                    });
                                }
                            });
                        });
                    }
                });

                return Array.from(entityMap.values());
            }

            init() {
                this.renderStats();
                this.renderTable();
                this.bindEvents();
            }

            renderStats() {
                const total = this.entities.length;
                const covered = this.entities.filter(e => e.links.length > 0).length;
                const uncovered = total - covered;

                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = `
                    <div class="stat-card">
                        <h3>${total}</h3>
                        <p>总实体数</p>
                    </div>
                    <div class="stat-card has-links">
                        <h3>${covered}</h3>
                        <p>有链接覆盖</p>
                    </div>
                    <div class="stat-card no-links">
                        <h3>${uncovered}</h3>
                        <p>无链接覆盖</p>
                    </div>
                    <div class="stat-card">
                        <h3>${Math.round(covered / total * 100)}%</h3>
                        <p>覆盖率</p>
                    </div>
                `;
            }

            renderTable(filter = 'all', search = '') {
                const tbody = document.getElementById('entity-tbody');
                let filtered = this.entities;

                // 应用过滤器
                if (filter === 'covered') {
                    filtered = filtered.filter(e => e.links.length > 0);
                } else if (filter === 'uncovered') {
                    filtered = filtered.filter(e => e.links.length === 0);
                } else if (filter !== 'all') {
                    filtered = filtered.filter(e => e.type === filter);
                }

                // 应用搜索
                if (search) {
                    search = search.toLowerCase();
                    filtered = filtered.filter(e =>
                        e.name.toLowerCase().includes(search)
                    );
                }

                tbody.innerHTML = filtered.map(entity => {
                    // 获取实体所在section的审核状态
                    let sectionStatus = 'pending';
                    if (entity.sections && entity.sections.length > 0) {
                        const sectionId = `section_${entity.sections[0].replace('.', '_')}`;
                        sectionStatus = this.dataManager.getStatus(sectionId);
                    }

                    return `
                    <tr>
                        <td><strong>${entity.name}</strong></td>
                        <td><span class="entity-type ${entity.type}">${entity.type}</span></td>
                        <td>${entity.year || '-'}</td>
                        <td>
                            <span class="coverage-status ${entity.links.length > 0 ? 'covered' : 'uncovered'}">
                                <i class="fas fa-${entity.links.length > 0 ? 'check-circle' : 'times-circle'}"></i>
                                ${entity.links.length > 0 ? '已覆盖' : '未覆盖'}
                            </span>
                        </td>
                        <td>
                            <span class="review-status ${sectionStatus}">
                                ${sectionStatus === 'reviewed' ? '✓ 已审核' : sectionStatus === 'need-more' ? '✗ 需补充' : '○ 待审核'}
                            </span>
                        </td>
                        <td>
                            ${entity.links.length > 0 ? `
                                <ul class="link-list">
                                    ${entity.links.slice(0, 3).map(link => `
                                        <li>
                                            <a href="${link.url}" target="_blank">
                                                ${link.url.length > 40 ? link.url.substring(0, 40) + '...' : link.url}
                                            </a>
                                            <span class="link-badge ${link.source_type}">${link.source_type}</span>
                                        </li>
                                    `).join('')}
                                    ${entity.links.length > 3 ? `<li style="color: var(--text-secondary); font-size: 0.85rem;">...还有 ${entity.links.length - 3} 个链接</li>` : ''}
                                </ul>
                            ` : '<span style="color: var(--status-need-more);">需要补充链接</span>'}
                        </td>
                    </tr>
                    `;
                }).join('');
            }

            bindEvents() {
                // 搜索
                document.getElementById('search-input').addEventListener('input', (e) => {
                    const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                    this.renderTable(activeFilter, e.target.value);
                });

                // 过滤按钮
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        const search = document.getElementById('search-input').value;
                        this.renderTable(e.target.dataset.filter, search);
                    });
                });
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new EntityCoverageChecker(reportData);
        });
    </script>
</body>
</html>
