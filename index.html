<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>参考文献提取完整性审核</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <h1><i class="fas fa-search"></i> 参考文献提取完整性审核</h1>
                <span class="subtitle">检查政策文件内容是否完整提取</span>
            </div>
            <div class="header-right">
                <div class="stats">
                    <span class="stat-item"><i class="fas fa-check-circle"></i> 已审核: <span id="reviewed-count">0</span></span>
                    <span class="stat-item"><i class="fas fa-clock"></i> 待审核: <span id="pending-count">0</span></span>
                    <span class="stat-item"><i class="fas fa-exclamation-circle"></i> 需补充: <span id="need-more-count">0</span></span>
                </div>
                <button id="export-btn" class="btn btn-primary"><i class="fas fa-download"></i> 导出报告</button>
                <button id="save-btn" class="btn btn-secondary"><i class="fas fa-save"></i> 保存</button>
            </div>
        </header>

        <!-- 文档标签页 -->
        <div class="tab-bar" id="tab-bar"></div>

        <main class="main-content">
            <div class="mindmap-container" id="mindmap">
                <div class="mindmap-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>加载中...</p>
                </div>
            </div>

            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2 id="sidebar-title">选择节点查看</h2>
                    <button class="close-btn" id="close-sidebar"><i class="fas fa-times"></i></button>
                </div>
                <div class="sidebar-content" id="sidebar-content">
                    <div class="placeholder">
                        <i class="fas fa-mouse-pointer"></i>
                        <p>点击思维导图节点审核内容完整性</p>
                    </div>
                </div>
            </aside>
        </main>

        <div class="legend">
            <div class="legend-items">
                <span class="legend-item"><span class="dot reviewed"></span> 完整</span>
                <span class="legend-item"><span class="dot pending"></span> 待审核</span>
                <span class="legend-item"><span class="dot need-more"></span> 需补充</span>
            </div>
        </div>
    </div>

    <!-- 注释模态框 -->
    <div class="modal" id="note-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-sticky-note"></i> 记录问题</h3>
                <button class="close-btn" id="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <textarea id="note-text" placeholder="记录提取问题...&#10;&#10;例如：&#10;- 内容截断，缺少后半部分&#10;- 表格数据未提取&#10;- 缺少关键政策条款"></textarea>
                <div class="note-tags">
                    <label>快速标签：</label>
                    <button class="tag-btn" data-tag="内容截断">内容截断</button>
                    <button class="tag-btn" data-tag="表格丢失">表格丢失</button>
                    <button class="tag-btn" data-tag="缺少条款">缺少条款</button>
                    <button class="tag-btn" data-tag="格式错误">格式错误</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-note">取消</button>
                <button class="btn btn-primary" id="save-note">保存</button>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="data_tabs.js"></script>
    <script src="mindmap_tabs.js"></script>
    <script src="app_tabs.js"></script>
</body>
</html>
